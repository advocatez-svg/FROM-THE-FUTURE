name: فرص شقق الطوابق الأخرى (مرتين يومياً + يدوي)

on:
  schedule:
    - cron: '0 10 * * *'        # 13:00 Asia/Amman
    - cron: '0 20 * * *'        # 23:00 Asia/Amman
  workflow_dispatch:
    inputs:
      send_telegram:
        description: 'Send one Telegram batch after updating data'
        required: false
        default: 'false'
      batch_index:
        description: 'Telegram batch index'
        required: false
        default: '0'

permissions:
  contents: write

concurrency:
  group: standard-floor-deals
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: سحب فرص شقق الطوابق الأخرى
        run: python scripts/pipeline_standard_floors.py
      - name: حفظ بيانات الطوابق الأخرى
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/standard_floor_*.json
          git commit -m "تحديث فرص شقق الطوابق الأخرى ($(date -u +%F))" || echo "لا تغييرات"
          git push || echo "لا شيء للدفع"
      - name: إرسال دفعة تيليجرام للطوابق الأخرى
        if: ${{ github.event.inputs.send_telegram == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BATCH_INDEX: ${{ github.event.inputs.batch_index }}
          TELEGRAM_BATCH_SIZE: '2'
          FACEBOOK_GROUP_URL: ${{ vars.FACEBOOK_GROUP_URL }}
        run: python scripts/telegram_send_standard_floors.py
