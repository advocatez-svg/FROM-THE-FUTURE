name: Middle-class apartment deals

on:
  schedule:
    - cron: '0 12 * * *'        # 15:00 Asia/Amman
  workflow_dispatch:
    inputs:
      send_telegram:
        description: 'Send one Telegram batch after updating data'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: middle-class-deals
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Build middle-class data
        run: python scripts/pipeline_middle_class.py
      - name: Save middle-class data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/middle_class_*.json
          git commit -m "Update middle-class apartment deals ($(date -u +%F))" || echo "No changes"
          git push || echo "Nothing to push"
      - name: Send Telegram middle-class batch
        if: ${{ github.event_name == 'schedule' || github.event.inputs.send_telegram == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          FACEBOOK_GROUP_URL: ${{ vars.FACEBOOK_GROUP_URL }}
        run: python scripts/telegram_send_middle_class.py
