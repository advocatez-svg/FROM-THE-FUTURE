name: تحديث الداشبورد وإرسال أفضل الفرص (كل يومين 8 مساءً)
on:
  schedule:
    - cron: '0 17 */2 * *'      # كل يومين 17:00 UTC = 20:00 (8 مساءً) بتوقيت عمّان
  workflow_dispatch: {}         # تشغيل يدوي عند الحاجة
permissions:
  contents: write
concurrency:
  group: daily-deals
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: سحب البيانات وتحديث الداشبورد
        run: python scripts/pipeline.py
      - name: حفظ الداشبورد والبيانات في المستودع
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html data/
          git commit -m "تحديث دوري للداشبورد وأفضل الفرص ($(date -u +%F))" || echo "لا تغييرات"
          git push || echo "لا شيء للدفع"
      - name: إرسال أفضل الفرص إلى تيليجرام
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL:      ${{ vars.DASHBOARD_URL }}
        run: python scripts/telegram_send.py
