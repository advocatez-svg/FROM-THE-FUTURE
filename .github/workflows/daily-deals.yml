name: تحديث الداشبورد وأفضل الفرص (يومياً 8 مساءً)
on:
  schedule:
    - cron: '0 17 * * *'        # يومياً 17:00 UTC = 20:00 مساءً بتوقيت عمّان
  workflow_dispatch: {}         # تشغيل يدوي عند الحاجة
permissions:
  contents: write
concurrency:
  group: daily-deals
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: سحب البيانات وتحديث الداشبورد
        run: python scripts/pipeline.py
      - name: حفظ الداشبورد والبيانات في المستودع
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html data/
          git commit -m "تحديث دوري للداشبورد وأفضل الفرص ($(date -u +%F))" || echo "لا تغييرات"
          git push || echo "لا شيء للدفع"
